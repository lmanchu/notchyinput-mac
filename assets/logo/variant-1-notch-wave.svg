<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Variant 1: Notch + sound wave -->
  <!-- Concept: macOS Dynamic Island shape with animated-looking sound wave inside -->
  <!-- Style: black pill on white bg, monochrome, clean hacker aesthetic -->
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background (macOS app icon style) -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg1)"/>
  <!-- Dynamic Island pill shape (centered horizontally, upper third) -->
  <rect x="262" y="380" width="500" height="170" rx="85" ry="85" fill="#000000" stroke="#2a2a2a" stroke-width="2"/>
  <!-- Sound wave bars inside the pill -->
  <g fill="#ffffff">
    <rect x="362" y="450" width="14" height="30" rx="7"/>
    <rect x="396" y="430" width="14" height="70" rx="7"/>
    <rect x="430" y="410" width="14" height="110" rx="7"/>
    <rect x="464" y="395" width="14" height="140" rx="7"/>
    <rect x="498" y="380" width="14" height="170" rx="7"/>
    <rect x="532" y="395" width="14" height="140" rx="7"/>
    <rect x="566" y="410" width="14" height="110" rx="7"/>
    <rect x="600" y="430" width="14" height="70" rx="7"/>
    <rect x="634" y="450" width="14" height="30" rx="7"/>
  </g>
  <!-- Wordmark below -->
  <text x="512" y="720" font-family="-apple-system, SF Pro Display, system-ui, sans-serif" font-weight="600" font-size="96" text-anchor="middle" fill="#ffffff" letter-spacing="-2">NotchyInput</text>
  <text x="512" y="790" font-family="-apple-system, SF Pro Text, system-ui, sans-serif" font-weight="400" font-size="36" text-anchor="middle" fill="#888888" letter-spacing="4">VOICE FOR macOS</text>
</svg>
