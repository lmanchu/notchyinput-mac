<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Variant 3: Pure minimal — Dynamic Island as the "N" -->
  <!-- Concept: the pill itself becomes the negative space of a stylized N -->
  <!-- Style: single accent color (purple/blue gradient), strong wordmark, OSS-tool aesthetic -->
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#f0f0f0"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg3)"/>
  <!-- Geometric mark: two vertical bars + the notch pill diagonally connecting them = N -->
  <g transform="translate(0,40)">
    <!-- Left vertical bar -->
    <rect x="320" y="320" width="60" height="320" rx="30" fill="url(#accent3)"/>
    <!-- Right vertical bar -->
    <rect x="644" y="320" width="60" height="320" rx="30" fill="url(#accent3)"/>
    <!-- Diagonal Dynamic Island pill connecting top-left to bottom-right -->
    <g transform="rotate(45, 512, 480)">
      <rect x="340" y="450" width="344" height="60" rx="30" fill="url(#accent3)"/>
    </g>
  </g>
  <!-- Wordmark -->
  <text x="512" y="800" font-family="-apple-system, SF Pro Display, system-ui, sans-serif" font-weight="700" font-size="104" text-anchor="middle" fill="#0a0a0a" letter-spacing="-3">NotchyInput</text>
  <text x="512" y="870" font-family="-apple-system, SF Mono, ui-monospace, monospace" font-weight="400" font-size="32" text-anchor="middle" fill="#6b7280" letter-spacing="2">open source · macOS</text>
</svg>
